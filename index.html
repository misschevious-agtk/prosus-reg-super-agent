<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Prosus · Digital Regulatory Monitor</title>
  <!-- Prosus brand font: Neuzeit Grotesk via Adobe Typekit -->
  <link rel="stylesheet" href="https://use.typekit.net/rdo1wyb.css"/>
  <style>
    /* ── PROSUS DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --cobalt-dark:    #060F76;
      --cobalt-prime:   #1136A8;
      --cobalt-light:   #1D5EDC;
      --cobalt-gradient: linear-gradient(90deg, #060F76 0%, #1D5EDC 100%);
      --graphite-dark:  #191919;
      --graphite-prime: #3F3F3F;
      --graphite-light: #666666;
      --oxide-dark:     #FC9628;
      --oxide-prime:    #FCB828;
      --oxide-light:    #FCDA28;
      --oxide-gradient: linear-gradient(90deg, #FC9628 0%, #FCDA28 100%);
      --argon-dark:     #850048;
      --argon-prime:    #AF015F;
      --argon-light:    #D90276;
      --argon-gradient: linear-gradient(90deg, #850048 0%, #D90276 100%);
      --chroride-dark:  #00856E;
      --chroride-prime: #00AC8E;
      --lithium-prime:  #5715B0;
      --white-dark:     #F1F3F4;
      --white-prime:    #F6F7F9;
      --white-light:    #FFFFFF;
      --text-color:     #4D4D4D;
      --border:         #DDE2EE;
      --shadow-sm:      0px 2px 8px rgba(6,15,118,0.08);
      --shadow-md:      0px 4px 16px rgba(6,15,118,0.12);
      --r:              6px;
      --font:           "neuzeit-grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--white-prime);
      color: var(--graphite-prime);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.55;
    }

    /* ── HEADER ───────────────────────────────────────────────────────── */
    .header {
      background: var(--cobalt-gradient);
      padding: 0;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px 12px;
    }
    .header-brand {
      display: flex; align-items: center; gap: 16px;
    }
    .prosus-logo {
      height: 22px; width: auto;
      filter: brightness(0) invert(1);
    }
    .header-divider {
      width: 1px; height: 28px;
      background: rgba(255,255,255,.3);
    }
    .header-product {
      color: rgba(255,255,255,.9);
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .header-meta {
      font-size: .7rem;
      color: rgba(255,255,255,.6);
      text-align: right;
      line-height: 1.4;
    }
    .header-meta strong { color: rgba(255,255,255,.9); }

    /* ── NAV STRIP ────────────────────────────────────────────────────── */
    .nav-strip {
      background: rgba(0,0,0,.2);
      overflow-x: auto; white-space: nowrap;
      padding: 0 24px;
      -webkit-overflow-scrolling: touch;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .nav-strip::-webkit-scrollbar { display: none; }
    .nav-btn {
      display: inline-block;
      font-family: var(--font);
      font-size: .72rem; font-weight: 600;
      letter-spacing: .4px;
      padding: 10px 16px;
      color: rgba(255,255,255,.55);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .15s, border-color .15s;
      text-transform: uppercase;
      user-select: none;
    }
    .nav-btn:hover { color: rgba(255,255,255,.9); }
    .nav-btn.active {
      color: var(--white-light);
      border-bottom-color: var(--oxide-prime);
    }

    /* ── FLASH ALERTS ─────────────────────────────────────────────────── */
    #flash-banner {
      display: none;
      background: #FFF9EC;
      border-bottom: 1px solid #F0D080;
      padding: 9px 28px;
    }
    .flash-row { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
    .flash-label {
      font-size: .62rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--oxide-dark); white-space: nowrap; padding-top: 2px;
    }
    .flash-item {
      font-size: .75rem; color: var(--graphite-prime);
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: border-color .15s, color .15s;
    }
    .flash-item:hover { color: var(--cobalt-prime); border-bottom-color: var(--cobalt-prime); }
    .flash-sep { color: var(--border); padding: 0 4px; }

    /* ── SEARCH ───────────────────────────────────────────────────────── */
    .search-strip {
      background: var(--white-light);
      border-bottom: 1px solid var(--border);
      padding: 10px 28px;
      display: flex; align-items: center; gap: 10px;
    }
    .search-icon {
      color: var(--graphite-light); font-size: 14px; flex-shrink: 0;
    }
    #search {
      flex: 1; max-width: 420px;
      font-family: var(--font);
      font-size: .82rem;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--white-prime);
      color: var(--graphite-prime);
      outline: none;
      transition: border-color .15s, background .15s;
    }
    #search:focus {
      border-color: var(--cobalt-light);
      background: var(--white-light);
    }
    #search::placeholder { color: var(--graphite-light); }

    /* ── LAYOUT ───────────────────────────────────────────────────────── */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    /* ── SECTION HEADER ───────────────────────────────────────────────── */
    .section-masthead {
      display: flex; align-items: center; gap: 14px;
      padding-bottom: 14px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--cobalt-dark);
    }
    .section-masthead h2 {
      font-size: 1.05rem; font-weight: 700;
      color: var(--cobalt-dark);
      letter-spacing: -.2px;
      text-transform: uppercase;
    }
    .section-count {
      font-size: .7rem; font-weight: 600;
      color: var(--graphite-light);
      background: var(--white-dark);
      padding: 2px 8px; border-radius: 10px;
    }
    .section-date {
      font-size: .68rem; color: var(--graphite-light);
      margin-left: auto;
    }

    /* ── CARD GRID ────────────────────────────────────────────────────── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .news-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 560px) { .news-grid { grid-template-columns: 1fr; } }

    /* Lead card — spans full width */
    .news-grid .card:first-child {
      grid-column: 1 / -1;
    }

    /* ── ARTICLE CARD ─────────────────────────────────────────────────── */
    .card {
      background: var(--white-light);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      border-color: #b8c4e0;
      transform: translateY(-1px);
    }
    .card:first-child {
      background: var(--cobalt-gradient);
      border-color: transparent;
      padding: 28px 32px;
    }
    .card:first-child:hover {
      box-shadow: 0px 8px 24px rgba(6,15,118,0.25);
    }

    /* Kicker / source line */
    .card-kicker {
      font-size: .62rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--cobalt-light);
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 6px;
    }
    .card:first-child .card-kicker { color: rgba(255,255,255,.65); }

    .portfolio-dot {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--oxide-gradient);
      flex-shrink: 0;
    }

    .card-headline {
      font-size: 1rem; font-weight: 700;
      line-height: 1.3;
      color: var(--graphite-dark);
      margin-bottom: 8px;
    }
    .card:first-child .card-headline {
      font-size: 1.45rem; line-height: 1.2;
      color: var(--white-light);
      margin-bottom: 12px;
    }

    .card-byline {
      font-size: .65rem; color: var(--graphite-light);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .card:first-child .card-byline { color: rgba(255,255,255,.6); }
    .card-byline .sep { color: var(--border); }

    .card-body-text {
      font-size: .82rem; color: var(--graphite-prime);
      line-height: 1.6;
      display: none;
      margin-top: 10px;
    }
    .card:first-child .card-body-text {
      display: block;
      color: rgba(255,255,255,.8);
    }
    .card.expanded .card-body-text { display: block; }

    .card-footer {
      margin-top: 12px;
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }

    /* Badges */
    .portfolio-badge {
      font-size: .6rem; font-weight: 700;
      padding: 2px 8px; border-radius: 3px;
      background: var(--argon-gradient);
      color: var(--white-light);
      letter-spacing: .3px;
    }
    .cat-badge {
      font-size: .6rem; font-weight: 600;
      padding: 2px 8px; border-radius: 3px;
      background: var(--white-prime);
      color: var(--cobalt-prime);
      border: 1px solid var(--border);
    }

    .read-link {
      font-size: .72rem; font-weight: 600;
      color: var(--cobalt-prime);
      text-decoration: none;
      display: inline-block; margin-top: 8px;
      transition: color .15s;
    }
    .read-link:hover { color: var(--cobalt-dark); text-decoration: underline; }
    .card:first-child .read-link { color: rgba(255,255,255,.85); }
    .card:first-child .read-link:hover { color: var(--oxide-light); }

    /* Flash card — oxide left stripe */
    .flash-card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      background: var(--oxide-gradient);
    }
    .flash-card { padding-left: 22px; }
    .card:first-child.flash-card { padding-left: 32px; }

    /* ── EMPTY / LOADING ──────────────────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center; padding: 56px 24px;
      font-size: .88rem; color: var(--graphite-light);
    }
    .empty .icon { font-size: 2.2rem; display: block; margin-bottom: 10px; }
    #spinner {
      text-align: center; padding: 72px;
      color: var(--graphite-light); font-size: .85rem;
    }

    /* ── FOOTER ───────────────────────────────────────────────────────── */
    footer {
      background: var(--cobalt-dark);
      padding: 20px 28px;
      font-size: .7rem; color: rgba(255,255,255,.45);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
    }
    .footer-brand {
      display: flex; align-items: center; gap: 12px;
    }
    .footer-logo {
      height: 16px; filter: brightness(0) invert(1); opacity: .5;
    }
    footer a { color: rgba(255,255,255,.55); text-decoration: none; }
    footer a:hover { color: var(--oxide-light); }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="header-brand">
      <img class="prosus-logo"
           src="https://www.prosus.com/~/media/Images/P/prosus-corp-v2/logo/logo-light.png"
           alt="Prosus" onerror="this.style.display='none';document.getElementById('prosus-wordmark').style.display='block'"/>
      <span id="prosus-wordmark" style="display:none;color:#fff;font-weight:700;font-size:1.1rem;letter-spacing:-.5px">prosus</span>
      <div class="header-divider"></div>
      <div class="header-product">Digital &amp; Regulatory Monitor</div>
    </div>
    <div class="header-meta" id="sync-meta">Loading…</div>
  </div>
  <div class="nav-strip" id="nav-strip">
    <span class="nav-btn active" data-cat="all">All</span>
    <span class="nav-btn" data-cat="ai_tech">AI &amp; Policy</span>
    <span class="nav-btn" data-cat="privacy_data">Privacy &amp; Data</span>
    <span class="nav-btn" data-cat="competition">Competition</span>
    <span class="nav-btn" data-cat="ip_brand">IP &amp; Brand</span>
    <span class="nav-btn" data-cat="fintech">Fintech</span>
    <span class="nav-btn" data-cat="platform_gig">Platform &amp; Gig</span>
    <span class="nav-btn" data-cat="prosus_only">⬡ Prosus</span>
  </div>
</div>

<!-- FLASH ALERTS -->
<div id="flash-banner">
  <div class="flash-row">
    <span class="flash-label">⚡ Flash</span>
    <span id="flash-items"></span>
  </div>
</div>

<!-- SEARCH -->
<div class="search-strip">
  <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  <input type="search" id="search" placeholder="Search articles, topics, companies…"/>
</div>

<!-- MAIN -->
<div class="page-wrap">
  <div id="main"><div id="spinner">Loading intelligence…</div></div>
</div>

<footer>
  <div class="footer-brand">
    <img class="footer-logo"
         src="https://www.prosus.com/~/media/Images/P/prosus-corp-v2/logo/logo-light.png"
         alt="Prosus" onerror="this.style.display='none'"/>
    <span>Digital &amp; Regulatory Intelligence · 30-day window · Updated daily 06:00 UTC</span>
  </div>
  <a href="https://github.com/misschevious-agtk/prosus-reg-super-agent" target="_blank">GitHub ↗</a>
</footer>

<script>
const DATA_URL = 'content/index.json';

const TABS = [
  { key:'ai_tech',      label:'AI & Policy' },
  { key:'privacy_data', label:'Privacy & Data' },
  { key:'competition',  label:'Competition' },
  { key:'ip_brand',     label:'IP & Brand' },
  { key:'fintech',      label:'Fintech' },
  { key:'platform_gig', label:'Platform & Gig' },
];
const CAT_LABELS = {
  all:'All Articles',
  ai_tech:'AI & Policy',
  privacy_data:'Privacy & Data',
  competition:'Competition',
  ip_brand:'IP & Brand',
  fintech:'Fintech',
  platform_gig:'Platform & Gig',
  prosus_only:'Prosus Portfolio',
};

let data = null, currentCat = 'all', searchQuery = '', flashIds = new Set();

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    data = await r.json();
    (data.flash_alerts||[]).forEach(a => flashIds.add(a.uid||a.id));
    renderMeta();
    renderFlash();
    renderMain();
  } catch(e) {
    document.getElementById('main').innerHTML =
      '<div class="news-grid"><div class="empty"><span class="icon">⚠️</span>Could not load content.</div></div>';
  }
}

function renderMeta() {
  if (!data) return;
  const d = new Date(data.generated_at);
  const fmt = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('sync-meta').innerHTML =
    `<strong style="color:rgba(255,255,255,.9)">${fmt}</strong><br/>${data.sources||'–'} sources`;
}

function renderFlash() {
  const alerts = data.flash_alerts || [];
  if (!alerts.length) return;
  const banner = document.getElementById('flash-banner');
  const items  = document.getElementById('flash-items');
  banner.style.display = 'block';
  items.innerHTML = alerts.slice(0,5).map((a,i) =>
    (i>0?'<span class="flash-sep">·</span>':'')+
    `<span class="flash-item" onclick="jumpTo('${esc(a.uid||a.id||'')}','${esc(a.category||'')}')">${esc(a.title)}</span>`
  ).join('');
}

function jumpTo(id, cat) {
  const target = cat || findCat(id);
  if (target && currentCat !== target) setTab(target);
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('expanded'); }
  }, 80);
}

function findCat(id) {
  for (const t of TABS) {
    if ((data[t.key]||[]).some(a=>(a.uid||a.id)===id)) return t.key;
  }
  return 'all';
}

function setTab(cat) {
  currentCat = cat;
  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.cat === cat));
  renderMain();
  window.scrollTo({top:0,behavior:'smooth'});
}

function getArticles() {
  if (!data) return [];
  let arts = [];
  const seen = new Set();

  if (currentCat === 'all') {
    TABS.forEach(t => {
      (data[t.key]||[]).forEach(a => {
        const key = a.uid||a.id||a.title;
        if (!seen.has(key)) { seen.add(key); arts.push(a); }
      });
    });
    arts.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  } else if (currentCat === 'prosus_only') {
    TABS.forEach(t => {
      (data[t.key]||[]).forEach(a => {
        const key = a.uid||a.id||a.title;
        if (!seen.has(key) && (a.portfolio||[]).length > 0) {
          seen.add(key); arts.push(a);
        }
      });
    });
    arts.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  } else {
    arts = data[currentCat] || [];
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    arts = arts.filter(a =>
      (a.title||'').toLowerCase().includes(q) ||
      (a.source||'').toLowerCase().includes(q) ||
      (a.body||'').toLowerCase().includes(q) ||
      (a.portfolio||[]).some(e=>e.toLowerCase().includes(q))
    );
  }
  return arts;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(a, isLead) {
  const isFlash   = flashIds.has(a.uid||a.id);
  const portfolio = a.portfolio||[];
  const hasPort   = portfolio.length > 0;

  const kicker = esc(a.source||'');
  const date   = esc(a.date||'');

  const portBadges = portfolio.map(e =>
    `<span class="portfolio-badge">⬡ ${esc(e)}</span>`).join('');
  const portDot = hasPort
    ? `<span class="portfolio-dot" title="Prosus portfolio"></span>` : '';

  const readLink = a.url
    ? `<a class="read-link" href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read full article →</a>` : '';
  const bodyHtml = a.body
    ? `<div class="card-body-text">${esc(a.body)}…<br/>${readLink}</div>` : '';

  const flashClass = isFlash ? ' flash-card' : '';
  const uid = esc(a.uid||a.id||a.title||'');

  if (isLead) {
    return `<div class="card${flashClass}" data-id="${uid}" onclick="toggleCard(this)">
      <div class="card-kicker">${portDot}${kicker} · ${date}${hasPort?' · <span style="color:rgba(255,220,100,.9)">Portfolio</span>':''}</div>
      <div class="card-headline">${esc(a.title)}</div>
      ${bodyHtml}
      <div class="card-footer">${portBadges}${readLink&&!a.body?readLink:''}</div>
    </div>`;
  }

  return `<div class="card${flashClass}" data-id="${uid}" onclick="toggleCard(this)">
    <div class="card-kicker">${portDot}${kicker}</div>
    <div class="card-headline">${esc(a.title)}</div>
    <div class="card-byline"><span>${date}</span>${hasPort?'<span class="sep">·</span><span style="color:var(--argon-prime);font-weight:700">Portfolio</span>':''}</div>
    ${bodyHtml}
    <div class="card-footer">${portBadges}${readLink&&!a.body?readLink:''}</div>
  </div>`;
}

function renderMain() {
  const main  = document.getElementById('main');
  const arts  = getArticles();
  const label = CAT_LABELS[currentCat] || currentCat;
  const total = arts.length;

  if (!arts.length) {
    main.innerHTML = `<div class="news-grid"><div class="empty"><span class="icon">🔍</span>No articles found.</div></div>`;
    return;
  }

  let cards = '';
  arts.forEach((a, i) => { cards += buildCard(a, i === 0); });

  main.innerHTML = `
    <div class="section-masthead">
      <h2>${esc(label)}</h2>
      <span class="section-count">${total}</span>
      <span class="section-date" id="sync-meta-inline"></span>
    </div>
    <div class="news-grid">${cards}</div>`;

  if (data) {
    const d = new Date(data.generated_at);
    const s = document.getElementById('sync-meta-inline');
    if (s) s.textContent = 'Updated ' + d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }
}

function toggleCard(card) { card.classList.toggle('expanded'); }

document.getElementById('nav-strip').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (btn) setTab(btn.dataset.cat);
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderMain();
});

loadData();
</script>
</body>
</html>
